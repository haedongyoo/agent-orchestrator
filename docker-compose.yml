# OpenClaw Agent Orchestrator — Docker Compose (development)
#
# Network topology (security-critical):
#
#   backend-net  →  api, orchestrator-worker, orchestrator-beat, postgres, redis
#   agent-net    →  agent-worker-*, redis
#
#   Agent containers are on agent-net ONLY.
#   They can reach Redis (task queue) and the public internet (email/Telegram).
#   They CANNOT reach Postgres or the API service by hostname.
#   Agents communicate with the orchestrator exclusively via Redis queues.
#
# Quick start (development):
#   1. cp .env.example .env  && edit .env
#   2. make build
#   3. make up
#   4. make migrate           # run DB migrations once
#   5. open http://localhost:8000/docs
#
# Production: use docker-compose.prod.yml (see Makefile `prod-*` targets)

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openclaw"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"   # exposed for local DB tools (pgAdmin, DBeaver)

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend-net   # orchestrator reads/writes results
      - agent-net     # agents pick up tasks and post results
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"   # exposed for local debugging

  # ── API + Orchestrator (backend-net) ───────────────────────────────────────

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openclaw
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      APP_ENV: development
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - ./apps/api/app:/app/app   # hot-reload in dev (omitted in prod)
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8100:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload

  orchestrator-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openclaw
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Docker config for container management
      DOCKER_AGENT_NETWORK: agent-orchestrator_agent-net
      DOCKER_AGENT_IMAGE: openclaw/agent-runtime:latest
      # Must match the API service — used to decrypt API keys when spawning containers
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - ./apps/api/app:/app/app
      # Docker socket: allows orchestrator to spawn/stop/inspect agent containers.
      # SECURITY: This gives the orchestrator root-equivalent access to Docker.
      # In production, use Docker API over TLS with a restricted socket proxy instead.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.worker worker
        --loglevel=info
        --queues=orchestrator
        --concurrency=4

  orchestrator-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openclaw
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - ./apps/api/app:/app/app
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.worker beat
        --loglevel=info
        --scheduler celery.beat.PersistentScheduler

  # ── Agent Runtime (agent-net ONLY — cannot reach postgres or api) ──────────
  #
  # SECURITY: Do NOT add backend-net here. Ever.
  #
  # Agent containers are managed DYNAMICALLY by the orchestrator via Docker API.
  # This static definition exists only for building the image:
  #   docker compose --profile agent-dev build agent-worker
  #
  # To run manually for debugging:
  #   docker compose --profile agent-dev run -e AGENT_ID=<uuid> agent-worker
  #
  agent-worker:
    image: openclaw/agent-runtime:latest   # explicit name so ContainerManager can reference it
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AGENT_ID: ${AGENT_ID:-placeholder-set-agent-id}
      LLM_MODEL:      ${LLM_MODEL:-anthropic/claude-opus-4-6}
      LLM_API_KEY:    ${LLM_API_KEY:-}
      LLM_API_BASE:   ${LLM_API_BASE:-}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-32768}
    networks:
      - agent-net     # ONLY — no backend-net, no postgres access
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - agent-dev     # only runs when explicitly requested

  # ── Web UI (Next.js) ────────────────────────────────────────────────────────

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8100
        NEXT_PUBLIC_WS_URL: ws://localhost:8100
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100
      NEXT_PUBLIC_WS_URL: ws://localhost:8100
    networks:
      - backend-net
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3100:3000"

  # ── One-shot migration runner ──────────────────────────────────────────────
  #
  # Run with: make migrate   (or: docker compose --profile tools run --rm migrate)
  #
  migrate:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openclaw
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    profiles:
      - tools   # only runs when explicitly requested

volumes:
  postgres_data:
  redis_data:

networks:
  backend-net:
    driver: bridge
    internal: false   # api needs outbound for OAuth, webhook registration, etc.
  agent-net:
    driver: bridge
    internal: false   # agents need outbound for email SMTP/Telegram Bot API
