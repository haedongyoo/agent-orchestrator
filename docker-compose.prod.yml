# OpenClaw Agent Orchestrator — Docker Compose (production)
#
# All traffic flows through Caddy reverse proxy (ports 80/443).
# No other services expose ports to the host.
#
# Quick start:
#   1. cp .env.example .env && fill in real secrets
#   2. make prod-build
#   3. make prod-up
#   4. make prod-migrate
#   5. open http://<your-ip>/docs

services:

  # ── Reverse Proxy ──────────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3 (QUIC)
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend-net
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    networks:
      - backend-net
      - agent-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API + Orchestrator (backend-net) ───────────────────────────────────────

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: openclaw/api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/openclaw
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      APP_ENV: production
      LOG_LEVEL: info
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://150.230.183.145,http://localhost}
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No port exposure — Caddy handles all inbound traffic.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4

  orchestrator-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: openclaw/api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/openclaw
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      APP_ENV: production
      LOG_LEVEL: info
      DOCKER_AGENT_NETWORK: agent-orchestrator_agent-net
      DOCKER_AGENT_IMAGE: openclaw/agent-runtime:${IMAGE_TAG:-latest}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.worker worker
        --loglevel=info
        --queues=orchestrator
        --concurrency=4

  orchestrator-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: openclaw/api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/openclaw
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      APP_ENV: production
      LOG_LEVEL: info
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.worker beat
        --loglevel=info
        --scheduler celery.beat.PersistentScheduler

  # ── Web UI ────────────────────────────────────────────────────────────────

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://150.230.183.145/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://150.230.183.145}
    image: openclaw/web:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - backend-net
    depends_on:
      api:
        condition: service_healthy
    # No port exposure — Caddy handles all inbound traffic.

  # ── Agent Runtime (agent-net ONLY) ────────────────────────────────────────

  agent-worker:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    image: openclaw/agent-runtime:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AGENT_ID: ${AGENT_ID:-placeholder-set-agent-id}
      LLM_MODEL:      ${LLM_MODEL:-anthropic/claude-opus-4-6}
      LLM_API_KEY:    ${LLM_API_KEY:-}
      LLM_API_BASE:   ${LLM_API_BASE:-}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-32768}
    networks:
      - agent-net
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - agent-dev

  # ── One-shot migration runner ──────────────────────────────────────────────

  migrate:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: openclaw/api:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/openclaw
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  backend-net:
    driver: bridge
    internal: false
  agent-net:
    driver: bridge
    internal: false
