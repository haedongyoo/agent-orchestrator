name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Run tests ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Run tests
        run: python -m pytest apps/api/app/tests/ -v --tb=short
        env:
          SECRET_KEY: test-secret-key
          ENCRYPTION_KEY: test-encryption-key

  # ── Deploy to Oracle Cloud VM ────────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd $HOME/agent-orchestrator || git clone https://github.com/haedongyoo/agent-orchestrator.git $HOME/agent-orchestrator && cd $HOME/agent-orchestrator
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Build and deploy
            docker compose -f docker-compose.prod.yml build --parallel
            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d

            # Wait for API health
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T api curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "API healthy!"
                break
              fi
              [ "$i" -eq 30 ] && echo "API not healthy!" && docker compose -f docker-compose.prod.yml logs api --tail 20 && exit 1
              sleep 2
            done

            # Migrate
            docker compose -f docker-compose.prod.yml --profile tools run --rm migrate

            # Cleanup
            docker image prune -f
            echo "Deploy complete!"
            docker compose -f docker-compose.prod.yml ps
